<meta charset="UTF-8">

<title>FOUR FOUR FOUR</title>
<meta name="description" content="Forged in angelic chaos.">

<link href="fonts/fonts.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── 444 brand palette (Identity Guide v1.1) ── */
    --midnight:  #1A2332;
    --void:      #0c1118;
    --glacier:   #EEF2F5;
    --silver:    #D4DDE3;
    --arctic:    #5B7A95;
    --ice-mist:  #B8C8D4;
    --chrome:    #3D5060;

    --glacier-dim:  rgba(238, 242, 245, 0.55);
    --glacier-ghost:rgba(238, 242, 245, 0.30);
    --hair:        rgba(184, 200, 212, 0.14);
    --hair-bright: rgba(184, 200, 212, 0.28);

    --display: 'Audiowide', sans-serif;
    --primary: 'Inter', system-ui, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% -10%, #20304a 0%, var(--midnight) 38%, var(--void) 100%);
    color: var(--glacier);
    font-family: var(--mono);
    overflow: hidden;                 /* single screen — never scrolls */
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  canvas { display: block; }

  #webgl   { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; z-index: 0; }
  #vignette{ position: fixed; inset: 0; z-index: 2; pointer-events: none;
             background: radial-gradient(110% 80% at 50% 46%, transparent 52%, rgba(6,9,14,0.6) 100%); }
  #grain   { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.05; mix-blend-mode: screen;
             background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.5) 0 1px, transparent 1px 3px); }

  /* ════════ BOOT ════════ */
  #boot {
    position: fixed; inset: 0; z-index: 50; background: var(--void);
    transition: opacity 0.7s ease;
  }
  #boot.gone { opacity: 0; pointer-events: none; }
  /* the intro logo is positioned (in JS) to match the loaded wordmark exactly, so it never jumps */
  #boot-logo {
    position: fixed; left: 50%; top: 38%; transform: translateX(-50%); width: 250px; height: 61px; background: var(--glacier);
    -webkit-mask: var(--wm) center / contain no-repeat; mask: var(--wm) center / contain no-repeat;
    opacity: 0; filter: drop-shadow(0 0 18px rgba(91,122,149,0.55)); animation: breathe 3.4s ease-in-out infinite;
  }
  #boot-console {
    position: fixed; left: 0; right: 0; top: 56%; z-index: 50;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  @keyframes breathe { 0%,100%{ filter: drop-shadow(0 0 12px rgba(91,122,149,0.35)); } 50%{ filter: drop-shadow(0 0 26px rgba(184,200,212,0.7)); } }
  /* boot console: lines stream in at the bottom, older ones scroll up and fade out the top */
  #boot-lines {
    font-family: var(--mono); font-size: 10.5px; line-height: 1.55; letter-spacing: 0.05em;
    color: var(--ice-mist); width: min(560px, 88vw); height: 184px; opacity: 0;
    text-align: left; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    -webkit-mask-image: linear-gradient(transparent 0%, #000 26%, #000 100%);
            mask-image: linear-gradient(transparent 0%, #000 26%, #000 100%);
  }
  /* flex:none keeps each line at its natural height so they never shrink/overlap when flooding */
  #boot-lines .ln { flex: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #boot-lines .head { color: var(--ice-mist); }
  #boot-lines .sys  { color: var(--arctic); }
  #boot-lines .ok   { color: var(--silver); }
  #boot-lines .secured { color: var(--glacier); letter-spacing: 0.12em; }
  @media (max-height: 600px) { #boot-lines { height: 132px; } }
  #boot-bar-wrap { width: min(560px, 88vw); height: 2px; background: var(--hair); opacity: 0; overflow: hidden; }
  #boot-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--arctic), var(--ice-mist)); box-shadow: 0 0 12px rgba(184,200,212,0.8); transition: width 0.25s ease; }

  /* ════════ STAGE — single centered hub ════════ */
  /* stage stays composited; the boot overlay fades out OVER it so backdrop-filter never pops */
  #stage { position: fixed; inset: 0; z-index: 10; }

  /* fixed top rail + bottom footer */
  .rail, .foot {
    position: fixed; left: 0; right: 0; z-index: 12;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px; pointer-events: none;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.26em;
    color: var(--glacier-ghost); text-transform: uppercase;
  }
  .rail { top: 0; padding-top: max(16px, env(safe-area-inset-top)); }
  .foot { bottom: 0; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  .rail .mono-mark { width: 46px; height: 21px; background: var(--glacier);
    -webkit-mask: url(symbol.png) left center / contain no-repeat; mask: url(symbol.png) left center / contain no-repeat; opacity: 0.85; }
  .dot { color: var(--arctic); }

  /* the hub: vertically + horizontally centered, fits the viewport */
  .hub {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; padding: 72px 22px; text-align: center;
  }
  .mod-header {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 26px 18px 22px; border-bottom: 1px solid var(--hair);
  }
  .mod-kicker { font-family: var(--mono); font-size: 9px; letter-spacing: 0.32em; color: var(--ice-mist);
                text-transform: uppercase; opacity: 0.9; }
  .hub-wm { width: min(250px, 62vw); filter: drop-shadow(0 0 26px rgba(91,122,149,0.4)); }
  .hub-type { height: 15px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: var(--ice-mist); }
  .hub-type .cur { color: var(--arctic); animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .reveal { transform: none; }

  /* ── the links module ── */
  .module {
    width: min(420px, 90vw);
    border: 1px solid var(--hair);
    background: linear-gradient(180deg, rgba(26,35,50,0.6), rgba(12,17,24,0.62));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transform: translateY(16px);
    transition: transform 0.75s cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }
  .mod-label {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px; border-bottom: 1px solid var(--hair);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.26em; color: var(--ice-mist); text-transform: uppercase;
  }
  .mod-label .blip { width: 5px; height: 5px; border-radius: 50%; background: var(--chrome); display: inline-block; margin-left: 7px; vertical-align: middle; }
  .player.playing ~ * .blip, .player.playing .blip { background: var(--ice-mist); box-shadow: 0 0 9px var(--ice-mist); animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  /* compact player */
  .player { display: flex; align-items: center; gap: 12px; padding: 14px; }
  .p-btn {
    flex: none; width: 38px; height: 38px; border: 1px solid var(--hair-bright);
    background: rgba(91,122,149,0.14); color: var(--glacier);
    display: grid; place-items: center; cursor: pointer; transition: background .18s, border-color .18s, transform .1s;
  }
  .p-btn:hover { background: rgba(184,200,212,0.16); border-color: var(--ice-mist); }
  .p-btn:active { transform: scale(0.93); }
  .p-btn svg { width: 15px; height: 15px; fill: currentColor; }
  .p-next { width: 32px; height: 32px; }
  .p-mid { flex: 1; min-width: 0; text-align: left; display: flex; flex-direction: column; gap: 6px; }
  .p-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .p-title { font-family: var(--primary); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-time { font-family: var(--mono); font-size: 9px; color: var(--glacier-dim); letter-spacing: 0.06em; flex: none; }
  .p-viz { width: 100%; height: 22px; display: block; }

  /* track pills */
  .tracks { display: flex; gap: 6px; padding: 0 14px 14px; }
  .pill {
    flex: 1; padding: 8px 6px; cursor: pointer; text-align: center;
    border: 1px solid var(--hair); background: rgba(184,200,212,0.03);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--glacier-dim);
    text-transform: uppercase; transition: background .18s, border-color .18s, color .18s;
  }
  .pill:hover { background: rgba(91,122,149,0.12); color: var(--glacier); }
  .pill.active { border-color: var(--ice-mist); color: var(--ice-mist); background: rgba(91,122,149,0.16); }

  /* social links grid */
  .links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--hair); border-top: 1px solid var(--hair); }
  .link {
    background: rgba(12,17,24,0.55); padding: 18px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    transition: background .2s; position: relative;
  }
  .link:hover { background: rgba(91,122,149,0.16); }
  .link .l-ico { display: block; height: 20px; }
  .link .l-ico svg { width: 20px; height: 20px; display: block; fill: var(--silver); opacity: 0.85; transition: fill .2s, opacity .2s; }
  .link:hover .l-ico svg { fill: #fff; opacity: 1; }
  .link .l-v { font-family: var(--primary); font-weight: 600; font-size: 12px; color: var(--glacier-dim); transition: color .2s; }
  .link:hover .l-v { color: var(--glacier); }

  /* ── mobile: keep the whole hub inside one screen ── */
  @media (max-width: 520px) {
    .rail, .foot { font-size: 8px; letter-spacing: 0.14em; padding-left: 16px; padding-right: 16px; }
    .hub { padding: 56px 14px; gap: 0; }
    .module { width: 100%; max-width: 380px; }
    .mod-header { padding: 18px 14px 15px; gap: 9px; }
    .hub-wm { width: min(210px, 56vw); }
    .player { padding: 12px; gap: 10px; }
    .tracks { padding: 0 12px 12px; }
    .links { grid-template-columns: repeat(3, 1fr); }   /* 3×2 is shorter than 2×3 */
    .link { padding: 14px 6px; gap: 7px; }
    .link .l-v { font-size: 11px; }
  }
  /* short viewports (landscape phones / small laptops) — trim further so nothing clips */
  @media (max-height: 720px) {
    .hub { padding-top: 52px; padding-bottom: 52px; }
    .mod-header { padding: 16px 14px 14px; gap: 8px; }
    .hub-wm { width: min(190px, 50vw); }
    .link { padding: 12px 6px; }
  }
  @media (max-height: 600px) {
    .hub-type { display: none; }            /* drop the typed line when vertical space is scarce */
    .hub { padding-top: 44px; padding-bottom: 44px; }
    .mod-header { padding: 12px 14px; gap: 6px; }
    .hub-wm { width: min(170px, 44vw); }
    .player { padding: 10px 12px; }
    .link { padding: 9px 6px; }
  }
  @media (prefers-reduced-motion: reduce) {
    #boot-logo, .blip, .hub-type .cur { animation: none !important; }
  }
</style>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from './vendor/jsm/postprocessing/EffectComposer.js';
    import { RenderPass } from './vendor/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from './vendor/jsm/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from './vendor/jsm/postprocessing/OutputPass.js';
    import { GLTFLoader } from './vendor/jsm/loaders/GLTFLoader.js';
    import { BokehPass } from './vendor/jsm/postprocessing/BokehPass.js';
    import { ShaderPass } from './vendor/jsm/postprocessing/ShaderPass.js';

    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const canvas = document.getElementById('webgl');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));  // 1:1 — fill-rate is the bottleneck with bloom+DoF
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.12;

    const scene = new THREE.Scene();

    const bg = document.createElement('canvas'); bg.width = 4; bg.height = 512;
    const g = bg.getContext('2d');
    const grad = g.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0.0, '#22324c'); grad.addColorStop(0.42, '#1A2332'); grad.addColorStop(1.0, '#080b11');
    g.fillStyle = grad; g.fillRect(0, 0, 4, 512);
    const bgTex = new THREE.CanvasTexture(bg); bgTex.colorSpace = THREE.SRGBColorSpace;
    scene.background = bgTex;
    scene.fog = new THREE.FogExp2(0x0b0f16, 0.045);

    const RELIC_R = 11.0;                  // model normalized to this bounding radius
    const CAM_Z = 0.4;                     // camera sits INSIDE, pinned on the spin axis (Z), close to centre
    // shorter focal length / wider lens (~8mm ≈ 114deg FOV); deep inside the shape
    const camera = new THREE.PerspectiveCamera(114, window.innerWidth / window.innerHeight, 0.02, 200);
    camera.position.set(0, 0, CAM_Z);
    camera.lookAt(0, 0, 0);

    // palette-only reflection environment — a vertical gradient through the brand colours, so the
    // chrome can only ever reflect glacier/ice/arctic/midnight (no off-palette hues)
    const envC = document.createElement('canvas'); envC.width = 8; envC.height = 256;
    const ectx = envC.getContext('2d');
    const eg = ectx.createLinearGradient(0, 0, 0, 256);
    eg.addColorStop(0.00, '#E8F0FA');   // near-white cool highlight (bright bits = blue-white)
    eg.addColorStop(0.32, '#C2D6EC');   // light blue-white — dominant band
    eg.addColorStop(0.70, '#7E9DBE');   // soft arctic blue
    eg.addColorStop(1.00, '#34485C');   // chrome slate floor
    ectx.fillStyle = eg; ectx.fillRect(0, 0, 8, 256);
    const envTex = new THREE.CanvasTexture(envC);
    envTex.mapping = THREE.EquirectangularReflectionMapping;
    envTex.colorSpace = THREE.SRGBColorSpace;
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromEquirectangular(envTex).texture;
    envTex.dispose();

    const key = new THREE.DirectionalLight(0xEEF2F5, 2.6); key.position.set(4, 6, 5); scene.add(key);
    const rim = new THREE.DirectionalLight(0x8fb0c8, 2.4); rim.position.set(-6, -2, -4); scene.add(rim);
    const fill = new THREE.PointLight(0x9fc4e6, 11, 50); fill.position.set(0, -3, 4); scene.add(fill);  // bright light-blue fill
    scene.add(new THREE.HemisphereLight(0xA8C2DE, 0x1A2332, 0.7));   // cohesive cool blue-white ambient

    // ── wispies: decimated GLB of the client's deformed torus knot ──
    const mat = new THREE.MeshPhysicalMaterial({
      color: 0xC2D4E8, metalness: 1.0, roughness: 0.44,   // cool blue-white tint; bright bits read blue + white
      envMapIntensity: 2.6, side: THREE.DoubleSide
    });
    const relic = new THREE.Group();
    scene.add(relic);
    new GLTFLoader().load('wispies.glb', (gltf) => {
      gltf.scene.traverse((o) => { if (o.isMesh) o.material = mat; });
      // GLB is already centroid-centered; just normalize scale (no re-shift, or we'd undo the centering)
      const sph = new THREE.Box3().setFromObject(gltf.scene).getBoundingSphere(new THREE.Sphere());
      gltf.scene.scale.setScalar(RELIC_R / sph.radius);
      relic.add(gltf.scene);
    });

    // soft circular sprite so floaters are round dots, not square pixels
    const dotC = document.createElement('canvas'); dotC.width = dotC.height = 64;
    const dctx = dotC.getContext('2d');
    const dg = dctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    dg.addColorStop(0, 'rgba(255,255,255,1)'); dg.addColorStop(0.45, 'rgba(255,255,255,0.65)'); dg.addColorStop(1, 'rgba(255,255,255,0)');
    dctx.fillStyle = dg; dctx.beginPath(); dctx.arc(32, 32, 32, 0, Math.PI * 2); dctx.fill();
    const dotTex = new THREE.CanvasTexture(dotC);

    const N = 320, pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) { pos[i*3]=(Math.random()-0.5)*22; pos[i*3+1]=(Math.random()-0.5)*22; pos[i*3+2]=(Math.random()-0.5)*14-3; }
    const pGeo = new THREE.BufferGeometry(); pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const motes = new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: 0xB8C8D4, size: 0.05, map: dotTex, alphaMap: dotTex,
      transparent: true, opacity: 0.55, depthWrite: false
    }));
    scene.add(motes);

    // 8x MSAA target (8-bit, cheap — NOT half-float; clamps to GPU max) to kill the thin-strand aliasing
    const msTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, { samples: 8 });
    const composer = new EffectComposer(renderer, msTarget);
    composer.addPass(new RenderPass(scene, camera));
    // depth of field — focus near the front of the shape, blur the parts further away
    const bokeh = new BokehPass(scene, camera, { focus: 4.5, aperture: 0.00022, maxblur: 0.004 });
    composer.addPass(bokeh);
    composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.6, 0.6));
    // lens-style field curvature: sharp in the centre, softening toward the screen edges
    const RadialBlurShader = {
      uniforms: { tDiffuse: { value: null }, uResolution: { value: new THREE.Vector2(1, 1) },
                  uAspect: { value: new THREE.Vector2(1, 1) }, uStrength: { value: 6.0 }, uSat: { value: 1.0 } },
      vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
      fragmentShader: `
        uniform sampler2D tDiffuse; uniform vec2 uResolution; uniform vec2 uAspect; uniform float uStrength; uniform float uSat;
        varying vec2 vUv;
        void main(){
          vec2 c = (vUv - 0.5) * uAspect; float r = length(c);
          float m = smoothstep(0.5, 1.05, r); m = m * m;       // fully sharp centre; blur grows toward the edges
          vec2 s = (uStrength * m) / uResolution;              // per-cell step (uv)
          vec3 col = vec3(0.0);
          for (float i = -2.0; i <= 2.0; i += 1.0) {           // dense 5x5 box -> smooth, no mosaic
            for (float j = -2.0; j <= 2.0; j += 1.0) {
              col += texture2D(tDiffuse, vUv + vec2(i, j) * s).rgb;
            }
          }
          col /= 25.0;
          float L = dot(col, vec3(0.2126, 0.7152, 0.0722));
          col = mix(vec3(L), col, uSat);
          gl_FragColor = vec4(col, 1.0);
        }`
    };
    const radial = new ShaderPass(RadialBlurShader);
    const setRadial = () => { radial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
                              radial.uniforms.uAspect.value.set(window.innerWidth / window.innerHeight, 1); };
    setRadial();
    composer.addPass(radial);
    composer.addPass(new OutputPass());

    const tgt = { x: 0, y: 0 }, cur = { x: 0, y: 0 };
    window.addEventListener('pointermove', (e) => { tgt.x = (e.clientX/window.innerWidth-0.5); tgt.y = (e.clientY/window.innerHeight-0.5); });
    // audio reactivity hook — boot/UI script sets window.__txLevel 0..1
    window.__txLevel = 0;

    const clock = new THREE.Clock();
    let running = true;
    document.addEventListener('visibilitychange', () => { running = !document.hidden; if (running) clock.getDelta(); });

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      camera.aspect = w/h; camera.updateProjectionMatrix();
      renderer.setSize(w, h); composer.setSize(w, h); setRadial();
    }
    window.addEventListener('resize', resize);

    function tick() {
      requestAnimationFrame(tick);
      if (!running) return;
      const dt = Math.min(clock.getDelta(), 0.05), t = clock.elapsedTime;

      // roll the shape about Z — the camera is ON the Z axis, so every point's distance to it is
      // invariant under this rotation: the geometry can sweep around but never reach the camera
      if (!reduce) relic.rotation.z += dt * 0.08;

      motes.rotation.y += dt * 0.01;
      motes.position.y = (t * 0.06) % 4;

      // camera stays pinned on the spin axis; the mouse only tilts the gaze (no position change) -> still safe
      cur.x += (tgt.x - cur.x) * 0.035; cur.y += (tgt.y - cur.y) * 0.035;
      camera.position.set(0, 0, CAM_Z);
      camera.lookAt(cur.x * 0.022, -cur.y * 0.018, 0);

      composer.render();
    }
    tick();
    window.__glReady = true;

  <script>
  (function () {
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ── shortened boot (≈ half the original) ── */
    const boot = document.getElementById('boot');
    const bootLogo = document.getElementById('boot-logo');
    const bootLines = document.getElementById('boot-lines');
    const barWrap = document.getElementById('boot-bar-wrap');
    const bar = document.getElementById('boot-bar');
    const stage = document.getElementById('stage');

    /* pin the intro logo onto the loaded wordmark's exact rect so it never jumps on the handoff */
    const wmImg = document.getElementById('h-wm');
    const moduleEl = document.getElementById('module');
    function placeBootLogo() {
      const prev = moduleEl.style.transform;
      moduleEl.style.transform = 'none';          // measure the module's FINAL (revealed) position, not the slid-down one
      const r = wmImg.getBoundingClientRect();
      moduleEl.style.transform = prev;
      if (!r.width || !r.height) return;
      bootLogo.style.transform = 'none';
      bootLogo.style.left = r.left + 'px';
      bootLogo.style.top = r.top + 'px';
      bootLogo.style.width = r.width + 'px';
      bootLogo.style.height = r.height + 'px';
    }
    if (wmImg.complete) placeBootLogo(); else wmImg.addEventListener('load', placeBootLogo);
    window.addEventListener('resize', placeBootLogo);

    const MAXLN = 26;                              // keep the console DOM bounded
    const rng  = (a, b) => a + Math.random() * (b - a);
    const pick = a => a[Math.floor(Math.random() * a.length)];
    const hex  = n => { let s = ''; for (let i = 0; i < n; i++) s += '0123456789abcdef'[Math.floor(Math.random()*16)]; return s; };
    function emit(text, cls) {
      const div = document.createElement('div');
      div.className = 'ln' + (cls ? ' ' + cls : '');
      div.textContent = text;
      bootLines.appendChild(div);
      while (bootLines.children.length > MAXLN) bootLines.removeChild(bootLines.firstChild);
    }

    /* ── Phase 1 — the paced HEAVENLINK boot (typed, the part he loves) ── */
    const headLines = [
      '// INITIALIZING HEAVENLINK SYSTEM',
      '// LOADING AUDIO MATRIX',
      '// ESTABLISHING UPLINK',
      '// SYNCING TRANSMISSION RELAY',
      '// CALIBRATING SIGNAL INTEGRITY',
    ];
    function typeHead(i, done) {
      if (i >= headLines.length) { done(); return; }
      const div = document.createElement('div'); div.className = 'ln head'; bootLines.appendChild(div);
      const text = headLines[i]; let c = 0;
      (function ch() {
        if (c < text.length) { div.textContent += text[c++]; setTimeout(ch, reduce ? 4 : rng(16, 30)); }
        else { bar.style.width = Math.round((i + 1) / headLines.length * 52) + '%';
               setTimeout(() => typeHead(i + 1, done), reduce ? 40 : rng(150, 300)); }
      })();
    }

    /* ── Phase 2 — the flood: a torrent of console lines, piling up faster and faster ── */
    const MODS  = ['seraph','halo','vox','relay','choir','aether','cipher','beacon','psalm','umbra','oracle','matrix','signal','ascension'];
    const VERBS = ['mount','link','verify','cache','stream','decode','bind','sync','flush','probe','align','spool','resolve'];
    function floodLine() {
      switch (Math.floor(Math.random() * 6)) {
        case 0:  return [`[OK] ${pick(MODS)}.node 0x${hex(4)} registered`, 'ok'];
        case 1:  return [`>> ${pick(VERBS)} /heaven/${pick(MODS)}/${hex(2)} ... ${pick(['ok','done','204b','512b','1.2k'])}`, 'sys'];
        case 2:  return [`chk ${hex(8)} :: ${pick(['verified','passed','sealed'])}`, 'sys'];
        case 3:  return [`relay ${hex(3)}>${hex(3)} | ${Math.floor(rng(8,72))}ms`, 'sys'];
        case 4:  return [`audio.buffer ${pick(['44.1','48.0'])}khz / ${pick(['256','512','1024'])} ${pick(['ok','locked'])}`, 'sys'];
        default: return [`:: ${pick(MODS)} ascension +${Math.floor(rng(100,999))}`, 'sys'];
      }
    }
    function flood(done) {
      let n = 0; const total = reduce ? 10 : 80;
      (function step() {
        const burst = 1 + Math.floor(n / 22);                 // accelerate — more lines per tick over time
        for (let k = 0; k < burst && n < total; k++) { const [t, c] = floodLine(); emit(t, c); n++; }
        bar.style.width = Math.round(52 + (n / total) * 48) + '%';
        if (n < total) setTimeout(step, reduce ? 30 : Math.max(8, 26 - n * 0.22));
        else done();
      })();
    }

    /* ── Phase 3 — calm: the storm settles into the secured state ── */
    function calm(done) {
      bar.style.width = '100%';
      setTimeout(() => { emit('', ''); emit('// CONNECTION SECURED', 'secured'); }, 280);
      setTimeout(() => emit('// WELCOME', 'secured'), 760);
      setTimeout(done, reduce ? 500 : 1350);
    }

    function finishBoot() {
      placeBootLogo();                            // re-pin to the exact final rect right before the handoff
      boot.classList.add('gone'); stage.classList.add('in'); startHub();
      setTimeout(() => boot.remove(), 800);
    }
    function runBoot() {
      placeBootLogo();
      bootLogo.style.transition = 'opacity 0.45s'; bootLogo.style.opacity = '1';
      setTimeout(() => {
        bootLines.style.transition = barWrap.style.transition = 'opacity 0.3s';
        bootLines.style.opacity = barWrap.style.opacity = '1';
        typeHead(0, () => flood(() => calm(finishBoot)));
      }, reduce ? 120 : 520);
    }
    setTimeout(runBoot, 250);

    /* ── hub reveal + typewriter ── */
    function startHub() {
      setTimeout(() => document.getElementById('module').classList.add('reveal'), 200);
      setTimeout(typewriter, 760);
    }
    // friendly console voice — brand-kit flavored lines that cycle in the hub
    const HUB_LINES = [
      'welcome to the higher calling',
      'signal locked // you are tuned in',
      'transmission received, traveler',
      'between violence and beauty',
      'through the storm, not beyond it',
      'the relay is warm — stay a while',
      'celestial curiosity engaged',
      'you found the frequency',
      'the choir is listening',
    ];
    function typewriter() {
      const el = document.getElementById('typewriter');
      if (reduce) { el.textContent = HUB_LINES[0]; return; }
      let li = 0;
      function type() {
        const msg = HUB_LINES[li]; let i = 0;
        (function ch() {
          el.textContent = msg.slice(0, i++);
          if (i <= msg.length) setTimeout(ch, 42 + Math.random() * 28);
          else setTimeout(erase, 2300);
        })();
      }
      function erase() {
        const full = el.textContent; let i = full.length;
        (function ch() {
          el.textContent = full.slice(0, i);
          if (i-- > 0) setTimeout(ch, 22);
          else { li = (li + 1) % HUB_LINES.length; setTimeout(type, 380); }
        })();
      }
      type();
    }

    /* ── clock ── */
    const clockEl = document.getElementById('clock');
    (function tickClock(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
      clockEl.textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
      setTimeout(tickClock, 1000); })();

    /* ── live world-population counter (≈8.23B at base epoch, net +2.3/sec) ── */
    const popEl = document.getElementById('popcount');
    const POP_BASE = 8_231_600_000;                 // ~world population, 2026-06-18 00:00 UTC
    const POP_EPOCH = Date.UTC(2026, 5, 18, 0, 0, 0) / 1000;
    const POP_RATE = 2.3;                            // net births-minus-deaths per second
    (function popTick(){
      const now = Date.now() / 1000;
      const pop = Math.floor(POP_BASE + (now - POP_EPOCH) * POP_RATE);
      popEl.textContent = pop.toLocaleString('en-US');
      setTimeout(popTick, 400);
    })();

    /* ════ TRANSMISSIONS (compact) ════ */
    const TX = [
      { title: 'ENIGMA DEMO',   tag: 'ENIGMA',   src: 'audio/444-enigma-demo.m4a' },
      { title: 'FADEAWAY DEMO', tag: 'FADEAWAY', src: 'audio/444-fadeaway-demo.m4a' },
      { title: 'NRG DEMO',      tag: 'NRG',      src: 'audio/444-nrg-demo.m4a' },
    ];
    const audio = new Audio(); audio.preload = 'metadata';
    let idx = 0, ctx, analyser, freq;

    const elList = document.getElementById('tx-list');
    const elTitle = document.getElementById('tx-title');
    const elState = document.getElementById('tx-state');
    const elCur = document.getElementById('tx-cur');
    const elDur = document.getElementById('tx-dur');
    const elIcon = document.getElementById('tx-play-icon');
    const player = document.getElementById('tx');
    const viz = document.getElementById('tx-viz');
    const vctx = viz.getContext('2d');

    const fmt = s => { if (!isFinite(s)) return '0:00'; const m=Math.floor(s/60),x=Math.floor(s%60); return `${m}:${String(x).padStart(2,'0')}`; };

    TX.forEach((t, i) => {
      const pill = document.createElement('div');
      pill.className = 'pill' + (i===0 ? ' active' : ''); pill.textContent = t.tag;
      pill.addEventListener('click', () => { load(i); play(); });
      elList.appendChild(pill);
    });
    function setActive(){ [...elList.children].forEach((p,i)=>p.classList.toggle('active', i===idx)); }
    function load(i){ idx=(i+TX.length)%TX.length; audio.src=TX[idx].src; elTitle.textContent=TX[idx].title; setActive(); }
    function ensureGraph(){
      if (ctx) return;
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      const sn = ctx.createMediaElementSource(audio);
      analyser = ctx.createAnalyser(); analyser.fftSize = 128; freq = new Uint8Array(analyser.frequencyBinCount);
      sn.connect(analyser); analyser.connect(ctx.destination);
    }
    function play(){ ensureGraph(); if (ctx.state==='suspended') ctx.resume(); audio.play(); }
    function toggle(){ audio.paused ? play() : audio.pause(); }

    audio.addEventListener('play', () => { elIcon.setAttribute('d','M6 5h4v14H6zM14 5h4v14h-4z'); elState.textContent='Broadcasting'; player.classList.add('playing'); });
    audio.addEventListener('pause', () => { elIcon.setAttribute('d','M8 5v14l11-7z'); elState.textContent='Standby'; player.classList.remove('playing'); });
    audio.addEventListener('ended', () => { load(idx+1); play(); });
    audio.addEventListener('loadedmetadata', () => { elDur.textContent = fmt(audio.duration); });
    audio.addEventListener('timeupdate', () => { elCur.textContent = fmt(audio.currentTime); });

    document.getElementById('tx-play').addEventListener('click', toggle);
    document.getElementById('tx-next').addEventListener('click', () => { load(idx+1); play(); });
    load(0);

    /* ── waveform viz + drive the 3D relic ── */
    function sizeViz(){ const dpr=Math.min(window.devicePixelRatio,2); vctx.setTransform(1,0,0,1,0,0); viz.width=viz.clientWidth*dpr; viz.height=viz.clientHeight*dpr; vctx.scale(dpr,dpr); }
    window.addEventListener('resize', sizeViz); setTimeout(sizeViz, 50);
    const BARS = 42;
    const levels = new Float32Array(BARS);   // persisted across frames so we can lerp
    (function draw(){
      requestAnimationFrame(draw);
      const w=viz.clientWidth, h=viz.clientHeight; if (!w) return;
      vctx.clearRect(0,0,w,h);
      const gap=2, bw=(w-(BARS-1)*gap)/BARS;
      const live = analyser && !audio.paused;
      if (live) analyser.getByteFrequencyData(freq);
      let sum=0;
      for (let i=0;i<BARS;i++){
        const target = live ? (freq[Math.floor(i/BARS*freq.length)]/255)
                            : (0.05 + 0.03*Math.sin(i*0.6 + Date.now()/600));
        // asymmetric lerp — quick attack, gentle release so bars move musically, not jittery
        const k = target > levels[i] ? 0.5 : 0.12;
        levels[i] += (target - levels[i]) * k;
        sum += levels[i];
        const bh=Math.max(1.5, levels[i]*h);
        const grd=vctx.createLinearGradient(0,h,0,h-bh); grd.addColorStop(0,'#5B7A95'); grd.addColorStop(1,'#EEF2F5');
        vctx.fillStyle=grd; vctx.fillRect(i*(bw+gap), h-bh, bw, bh);
      }
      window.__txLevel = audio.paused ? (window.__txLevel||0)*0.9 : (sum/BARS);
    })();
  })();
  </script>
</body>
