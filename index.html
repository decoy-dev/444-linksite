<meta charset="UTF-8">

<title>FOUR FOUR FOUR</title>
<meta name="description" content="Forged in angelic chaos.">
<link rel="icon" type="image/png" href="single-four.png">
<link href="fonts/fonts.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── 444 brand palette (Identity Guide v1.1) ── */
    --midnight:  #1A2332;
    --void:      #0c1118;
    --glacier:   #EEF2F5;
    --silver:    #D4DDE3;
    --arctic:    #5B7A95;
    --ice-mist:  #B8C8D4;
    --chrome:    #3D5060;

    --glacier-dim:  rgba(238, 242, 245, 0.55);
    --glacier-ghost:rgba(238, 242, 245, 0.30);
    --hair:        rgba(184, 200, 212, 0.14);
    --hair-bright: rgba(184, 200, 212, 0.28);

    --display: 'Audiowide', sans-serif;
    --primary: 'Inter', system-ui, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;

    /* angular "HUD" panel silhouette — chamfered corners, a notched top-right, an angled bottom-left (voltra-inspired) */
    --hud-shape: polygon(0 15px, 15px 0, calc(100% - 34px) 0, calc(100% - 18px) 16px, 100% 16px, 100% calc(100% - 15px), calc(100% - 15px) 100%, 34px 100%, 0 calc(100% - 30px));
  }

  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 90% at 50% -10%, #20304a 0%, var(--midnight) 38%, var(--void) 100%);
    color: var(--glacier);
    font-family: var(--mono);
    overflow: hidden;                 /* single screen — never scrolls */
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  canvas { display: block; }

  #webgl   { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; z-index: 0; }
  #vignette{ position: fixed; inset: 0; z-index: 2; pointer-events: none;
             background: radial-gradient(110% 80% at 50% 46%, transparent 52%, rgba(6,9,14,0.6) 100%); }
  #grain   { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.05; mix-blend-mode: screen;
             background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.5) 0 1px, transparent 1px 3px); }

  /* ════════ BOOT — content "initializing": the real relic loads in (wireframe) behind a console + the menu skeleton, then a white flash reveals the live UI ════════ */
  #boot {
    position: fixed; inset: 0; z-index: 50; overflow: hidden;
    background: #000;                                /* starts completely black; fades to a veil so the WebGL relic shows through behind */
    transition: background-color 1.4s ease;
  }
  #boot.gone { opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
  /* CRT scanlines over the whole boot for the "rendered on a monitor" feel — subtle, darkens only the thin lines */
  #boot::after {
    content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0.3;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(4,7,12,0.5) 2px 3px);
  }

  /* the intro logo — a hollow vector OUTLINE of the wordmark that BUILDS OUT from the centre during the render,
     pinned (in JS) to the final wordmark rect so it never jumps; the live filled hub wordmark takes over at the white flash */
  #boot-logo {
    position: fixed; left: 50%; top: 38%; transform: translateX(-50%); width: 250px; height: 61px; object-fit: contain;
    opacity: 0; filter: drop-shadow(0 0 14px rgba(120,160,190,0.6)); z-index: 3;
    clip-path: inset(0 50% 0 50%); -webkit-clip-path: inset(0 50% 0 50%);   /* starts collapsed at the centre; opens outward as it builds */
  }

  /* content-module skeleton — pinned (in JS) to the final module rect, then builds top→down behind a scanline */
  #skel-module {
    position: fixed; opacity: 0; z-index: 2; overflow: hidden;
    clip-path: var(--hud-shape); -webkit-clip-path: var(--hud-shape);   /* match the real panel's chamfered silhouette */
    border: 1px solid var(--hair-bright);
    background: linear-gradient(180deg, rgba(91,122,149,0.06), rgba(12,17,24,0.18));
    transition: opacity 0.7s ease;                 /* smooth fade-in (no strobe) */
  }
  /* the build wrapper is clipped from the bottom; revealing it downward "draws" the lines in */
  #skel-build { position: absolute; inset: 0; clip-path: inset(0 0 100% 0); -webkit-clip-path: inset(0 0 100% 0); }
  #skel-module .sk { position: absolute; left: 0; right: 0; }
  /* dashed divider lines that draw in as the scan passes */
  #skel-module .sk-line {
    height: 1px; box-shadow: 0 0 6px rgba(184,200,212,0.22);
    background: repeating-linear-gradient(90deg, rgba(184,200,212,0.45) 0 7px, transparent 7px 12px);
  }
  /* registration brackets at the module corners */
  #skel-module .sk-brk { position: absolute; width: 13px; height: 13px; border: 0 solid var(--ice-mist); opacity: 0.7; }
  #skel-module .sk-brk.tl { top: 5px; left: 5px;  border-top-width: 1px; border-left-width: 1px; }
  #skel-module .sk-brk.tr { top: 5px; right: 5px; border-top-width: 1px; border-right-width: 1px; }
  #skel-module .sk-brk.bl { bottom: 5px; left: 5px;  border-bottom-width: 1px; border-left-width: 1px; }
  #skel-module .sk-brk.br { bottom: 5px; right: 5px; border-bottom-width: 1px; border-right-width: 1px; }
  /* player pane placeholder: a play-button square + a waveform crosshair (matches the real player band ~35–46%) */
  #skel-module .sk-player { top: 35%; height: 11%; left: 7%; right: 7%; display: flex; align-items: center; gap: 7%; padding: 0 6%;
    border: 1px solid var(--hair-bright); background: rgba(184,200,212,0.03); }
  #skel-module .sk-sq { flex: none; height: 60%; aspect-ratio: 1; border: 1px solid var(--ice-mist); opacity: 0.6; }
  #skel-module .sk-cross { position: relative; flex: 1; height: 64%; }
  #skel-module .sk-cross::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: var(--hair-bright); }
  #skel-module .sk-cross::after  { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: var(--hair-bright); }
  /* track-pill row placeholder (matches the real 3 pills ~48–53%) */
  #skel-module .sk-tracks { top: 48%; height: 5%; left: 7%; right: 7%; display: flex; gap: 5px; }
  #skel-module .sk-tracks span { flex: 1; border: 1px solid var(--hair-bright); background: rgba(184,200,212,0.03); }
  /* links grid placeholder — 2 cols × 3 rows, bottom ~44% (matches the real social grid) */
  #skel-module .sk-grid {
    position: absolute; left: 0; right: 0; bottom: 0; height: 44%;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px;
    background: var(--hair); border-top: 1px solid var(--hair-bright);
  }
  /* each link cell gets a faint center "+" registration mark (echoes the reference's pane placeholders) */
  #skel-module .sk-grid span { position: relative; background: rgba(184,200,212,0.04); }
  #skel-module .sk-grid span::before {
    content: ''; position: absolute; inset: 0; margin: auto; width: 9px; height: 9px; opacity: 0.85;
    background: linear-gradient(var(--ice-mist),var(--ice-mist)) center/1px 9px no-repeat,
                linear-gradient(var(--ice-mist),var(--ice-mist)) center/9px 1px no-repeat;
  }
  #skel-module .sk-grid.lit span { animation: cellLit 0.55s ease; }
  @keyframes cellLit { 0%,100%{ background: rgba(184,200,212,0.04); } 38%{ background: rgba(184,200,212,0.30); } }
  /* the scanline rides the leading edge of the build */
  #scanline {
    position: absolute; left: -1px; right: -1px; top: 0; height: 2px; opacity: 0;
    background: linear-gradient(90deg, transparent, var(--ice-mist), transparent);
    box-shadow: 0 0 16px 2px rgba(184,200,212,0.6);
  }

  /* boot console — a measured stream of the assets actually being generated/loaded */
  #boot-console {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 4.5%;
    width: min(560px, 88vw); opacity: 0; z-index: 4;
  }
  #boot-lines {
    font-family: var(--mono); font-size: 10.5px; line-height: 1.62; letter-spacing: 0.04em;
    color: var(--ice-mist); height: 116px; text-align: left; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-end;
    -webkit-mask-image: linear-gradient(transparent 0%, #000 34%, #000 100%);
            mask-image: linear-gradient(transparent 0%, #000 34%, #000 100%);
  }
  #boot-lines .ln { flex: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                    opacity: 0; animation: lnIn 0.2s ease forwards; }
  @keyframes lnIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  #boot-lines .head    { color: var(--ice-mist); }
  #boot-lines .sys     { color: var(--arctic); }
  #boot-lines .ok      { color: var(--silver); }
  #boot-lines .secured { color: var(--glacier); letter-spacing: 0.1em; }
  @media (max-height: 640px) { #boot-lines { height: 92px; } #boot-console { bottom: 4%; } }

  /* white flash that the live content is revealed beneath */
  #boot-flash { position: fixed; inset: 0; z-index: 60; background: #fff; opacity: 0; pointer-events: none; }

  /* ════ "initializing" overlays — abstract panels, installer dialogs & big status text scan in (reference-video feel) ════ */
  #boot-fx { position: fixed; inset: 0; z-index: 6; pointer-events: none; }
  /* scan-in reveal used by every fx element */
  /* flashier: a brightness pop as the element scans open */
  @keyframes fxScan {
    0% { opacity: 0; clip-path: inset(0 0 100% 0); filter: brightness(2.6); }
    45% { opacity: 1; }
    60% { clip-path: inset(0 0 0 0); filter: brightness(2.6); }
    74% { filter: brightness(1); }
    100% { opacity: 1; clip-path: inset(0 0 0 0); filter: brightness(1); }
  }
  @keyframes fxOut  { from { opacity: 1; } to { opacity: 0; filter: blur(1.5px); transform: translateY(-3px); } }
  /* "power-on" boot-in: flash in squished, blink out/in to full size, THEN the contents render (CRT feel) */
  .fx-dlg.boot, .fx-rect.boot { animation: fxBootIn 0.62s steps(1, end) forwards; transform-origin: center; }
  @keyframes fxBootIn {
    0% { opacity: 0; transform: scaleY(0.1) scaleX(0.66); }
    16% { opacity: 1; transform: scaleY(0.1) scaleX(0.66); }        /* squished slit flashes on */
    30% { opacity: 0.12; transform: scaleY(0.1) scaleX(0.66); }     /* flash out */
    44% { opacity: 1; transform: scaleY(1) scaleX(1); }             /* flash in at full size */
    56% { opacity: 0.4; transform: scaleY(1) scaleX(1); }
    70% { opacity: 1; transform: scaleY(1) scaleX(1); }
    100% { opacity: 1; transform: scaleY(1) scaleX(1); }
  }
  /* contents fade in only after the box has settled */
  .fx-dlg.boot > *, .fx-rect.boot > * { animation: fxContentIn 0.35s ease 0.5s both; }
  @keyframes fxContentIn { from { opacity: 0; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .fx-dlg.boot, .fx-rect.boot, .fx-dlg.boot > *, .fx-rect.boot > * { animation: none !important; } }

  /* small HUD readout panel: corner ticks + label; holds either a scrolling histogram or a flooding console */
  .fx-rect { position: fixed; opacity: 0; border: 1px solid var(--hair-bright); background: rgba(91,122,149,0.05); }
  .fx-rect::before, .fx-rect::after { content: ''; position: absolute; width: 9px; height: 9px; border: 1px solid var(--ice-mist); opacity: 0.8; }
  .fx-rect::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
  .fx-rect::after  { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }
  .fx-rect .lbl { position: absolute; top: 6px; left: 9px; font-family: var(--mono); font-size: 7.5px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ice-mist); opacity: 0.85; }
  /* scrolling telemetry histogram — solid bars, no gradient, values shift left over time */
  .fx-rect .bars { position: absolute; left: 9px; right: 9px; bottom: 9px; top: 22px; display: flex; align-items: flex-end; gap: 2px;
    background-image: repeating-linear-gradient(0deg, rgba(184,200,212,0.07) 0 1px, transparent 1px 9px); }
  .fx-rect .bars i { flex: 1; background: var(--ice-mist); opacity: 0.55; height: 20%; transition: height 0.34s linear; }
  /* flooding console — fast-scrolling log lines */
  .fx-rect .con { position: absolute; left: 9px; right: 8px; top: 21px; bottom: 7px; overflow: hidden;
    font-family: var(--mono); font-size: 7px; line-height: 1.5; letter-spacing: 0.02em; color: var(--arctic);
    display: flex; flex-direction: column; justify-content: flex-end;
    -webkit-mask-image: linear-gradient(transparent, #000 38%); mask-image: linear-gradient(transparent, #000 38%); }
  .fx-rect .con div { white-space: nowrap; }
  .fx-rect .con .ok { color: var(--silver); }
  .fx-rect.in { animation: fxScan 0.5s ease forwards; }
  .fx-rect.out { animation: fxOut 0.4s ease forwards; }
  /* boot flash-blocks — solid white / outline rectangles that FLICKER in, hold a beat, flicker out (programmatic) */
  .fx-blk { position: fixed; z-index: 6; pointer-events: none; opacity: 0; animation: fxFlk var(--d, 0.6s) steps(1, end) forwards; }
  @keyframes fxFlk {
    0% { opacity: 0; } 9% { opacity: 1; } 18% { opacity: 0.08; } 27% { opacity: 1; } 38% { opacity: 0.25; } 48% { opacity: 1; }
    78% { opacity: 1; } 88% { opacity: 0.1; } 100% { opacity: 0; }
  }

  /* installer-style dialog box */
  .fx-dlg {
    position: fixed; width: min(236px, 82vw); opacity: 0; font-family: var(--mono);
    background: rgba(12,17,24,0.86); border: 1px solid var(--hair-bright);
    box-shadow: 0 10px 34px rgba(0,0,0,0.55); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .fx-dlg.in  { animation: fxScan 0.42s ease forwards; }
  .fx-dlg.out { animation: fxOut 0.4s ease forwards; }
  .fx-dlg-bar { display: flex; align-items: center; justify-content: space-between;
    padding: 6px 9px; border-bottom: 1px solid var(--hair);
    font-size: 8.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ice-mist); }
  .fx-dlg-bar .dots { letter-spacing: 0.12em; color: var(--glacier-ghost); }
  .fx-dlg-body { padding: 11px 10px 12px; }
  .fx-dlg-msg { font-size: 10px; letter-spacing: 0.04em; color: var(--glacier-dim); margin-bottom: 9px; white-space: nowrap; overflow: hidden; }
  .fx-dlg-msg.ok { color: var(--silver); }
  .fx-prog { height: 3px; background: var(--hair); overflow: hidden; }
  .fx-prog > i { display: block; height: 100%; width: 0; background: var(--ice-mist); box-shadow: 0 0 8px rgba(184,200,212,0.55); }

  /* large status text — rotated 90° CCW, pinned vertical along the LEFT edge (mobile-friendly, uses the tall axis) */
  .fx-big {
    position: fixed; left: 26px; top: 50%; transform-origin: center; white-space: nowrap; opacity: 0;
    transform: translate(-50%, -50%) rotate(-90deg);
    font-family: var(--mono); font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ice-mist); text-shadow: 0 0 16px rgba(91,122,149,0.55);
  }
  .fx-big.in { animation: fxBig 1.6s steps(1, end) forwards; }
  /* flashier: hard flicker-on like a sign powering up, then a steady hold, then cut */
  @keyframes fxBig {
    0%,7% { opacity: 0; } 9% { opacity: 0.95; } 13% { opacity: 0.1; } 17% { opacity: 1; }
    22% { opacity: 0.25; } 27% { opacity: 0.95; } 80% { opacity: 0.78; } 92% { opacity: 0.12; } 100% { opacity: 0; }
  }
  @media (max-width: 600px) { .fx-big { left: 18px; } }

  /* a soft band that sweeps down to "scan in" the (subtle) wireframe relic near the end */
  #relic-scan {
    position: fixed; left: 0; right: 0; top: -22%; height: 22%; opacity: 0; z-index: 3; pointer-events: none;
    background: linear-gradient(180deg, transparent, rgba(184,200,212,0.14) 70%, rgba(184,200,212,0.45));
  }

  @media (prefers-reduced-motion: reduce) { .fx-rect, .fx-dlg, .fx-big { animation: none !important; } }

  /* ════════ STAGE — single centered hub ════════ */
  /* hidden during boot so the transparent boot veil reveals only the WebGL relic (not the live hub); snapped visible under the opaque white flash, which then fades to reveal it */
  #stage { position: fixed; inset: 0; z-index: 10; opacity: 0; }
  #stage.live { opacity: 1; }

  /* fixed top rail + bottom footer */
  .rail, .foot {
    position: fixed; left: 0; right: 0; z-index: 12;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px; pointer-events: none;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.26em;
    color: var(--glacier-ghost); text-transform: uppercase;
  }
  .rail { top: 0; padding-top: max(16px, env(safe-area-inset-top)); }
  .foot { bottom: 0; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  .rail .mono-mark { width: 46px; height: 21px; background: var(--glacier);
    -webkit-mask: url(symbol.png) left center / contain no-repeat; mask: url(symbol.png) left center / contain no-repeat; opacity: 0.85; }
  .dot { color: var(--arctic); }

  /* the hub: vertically + horizontally centered, fits the viewport */
  .hub {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; padding: 72px 22px; text-align: center;
  }
  .mod-header {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 26px 18px 22px; border-bottom: 1px solid var(--hair);
  }
  .mod-kicker { font-family: var(--mono); font-size: 9px; letter-spacing: 0.32em; color: var(--ice-mist);
                text-transform: uppercase; opacity: 0.9; }
  .hub-wm { width: min(250px, 62vw); filter: drop-shadow(0 0 26px rgba(91,122,149,0.4)); }
  .hub-type { height: 15px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; color: var(--ice-mist); }
  .hub-type .cur { color: var(--arctic); animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .reveal { transform: none; }

  /* ── the vertical HUD panel (voltra-inspired): chamfered/notched silhouette, double-line edge, grid interior ── */
  .module {
    position: relative;
    width: min(306px, 88vw);                 /* narrow → portrait/vertical */
    clip-path: var(--hud-shape);
    background: var(--hair-bright);           /* outer layer = the edge colour */
    transform: translateY(16px);
    transition: transform 0.75s cubic-bezier(.2,.7,.2,1);
    will-change: transform;
  }
  /* fill, inset to leave a crisp ~1.5px edge that follows the chamfers; faint dotted grid inside */
  .module::before {
    content: ''; position: absolute; inset: 1.5px; z-index: 0; clip-path: var(--hud-shape);
    background: linear-gradient(180deg, rgba(26,35,50,0.7), rgba(12,17,24,0.74));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  /* bright glint along the top edge */
  .module::after {
    content: ''; position: absolute; left: 14%; right: 30%; top: 0; height: 2px; z-index: 3;
    background: linear-gradient(90deg, transparent, rgba(232,240,250,0.9), transparent);
  }
  .module > * { position: relative; z-index: 2; }
  .mod-label {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px; border-bottom: 1px solid var(--hair);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.26em; color: var(--ice-mist); text-transform: uppercase;
  }
  .mod-label .blip { width: 5px; height: 5px; border-radius: 50%; background: var(--chrome); display: inline-block; margin-left: 7px; vertical-align: middle; }
  .player.playing ~ * .blip, .player.playing .blip { background: var(--ice-mist); box-shadow: 0 0 9px var(--ice-mist); animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  /* compact player */
  .player { display: flex; align-items: center; gap: 12px; padding: 14px; }
  .p-btn {
    flex: none; width: 38px; height: 38px; border: 1px solid var(--hair-bright);
    background: rgba(91,122,149,0.14); color: var(--glacier);
    display: grid; place-items: center; cursor: pointer; transition: background .18s, border-color .18s, transform .1s;
  }
  .p-btn:hover { background: rgba(184,200,212,0.16); border-color: var(--ice-mist); }
  .p-btn:active { transform: scale(0.93); }
  .p-btn svg { width: 15px; height: 15px; fill: currentColor; }
  .p-next { width: 32px; height: 32px; }
  .p-mid { flex: 1; min-width: 0; text-align: left; display: flex; flex-direction: column; gap: 6px; }
  .p-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .p-title { font-family: var(--primary); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-time { font-family: var(--mono); font-size: 9px; color: var(--glacier-dim); letter-spacing: 0.06em; flex: none; }
  .p-viz { width: 100%; height: 22px; display: block; }

  /* volume control */
  .p-vol { display: flex; align-items: center; gap: 8px; }
  .p-vol-btn {
    flex: none; width: 18px; height: 18px; padding: 0; border: 0; background: none;
    color: var(--glacier-dim); cursor: pointer; display: grid; place-items: center;
    transition: color .18s;
  }
  .p-vol-btn:hover { color: var(--ice-mist); }
  .p-vol-btn.muted { color: var(--arctic); }
  .p-vol-btn svg { width: 15px; height: 15px; fill: currentColor; display: block; }
  .p-vol-range {
    -webkit-appearance: none; appearance: none; flex: 1; height: 12px;
    background: transparent; cursor: pointer; margin: 0;
  }
  .p-vol-range::-webkit-slider-runnable-track {
    height: 2px;
    background: linear-gradient(90deg, var(--ice-mist) var(--fill,50%), var(--hair-bright) var(--fill,50%));
  }
  .p-vol-range::-moz-range-track { height: 2px; background: var(--hair-bright); }
  .p-vol-range::-moz-range-progress { height: 2px; background: var(--ice-mist); }
  .p-vol-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 9px; height: 9px; margin-top: -3.5px;
    background: var(--glacier); border: 1px solid var(--arctic);
    box-shadow: 0 0 6px rgba(184,200,212,0.5); transition: background .15s;
  }
  .p-vol-range::-moz-range-thumb {
    width: 9px; height: 9px; border-radius: 0;
    background: var(--glacier); border: 1px solid var(--arctic);
    box-shadow: 0 0 6px rgba(184,200,212,0.5);
  }
  .p-vol-range:hover::-webkit-slider-thumb { background: var(--ice-mist); }
  .p-vol-range:focus-visible { outline: 1px solid var(--arctic); outline-offset: 3px; }

  /* track pills */
  .tracks { display: flex; gap: 6px; padding: 0 14px 14px; }
  .pill {
    flex: 1; padding: 8px 6px; cursor: pointer; text-align: center;
    border: 1px solid var(--hair); background: rgba(184,200,212,0.03);
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--glacier-dim);
    text-transform: uppercase; transition: background .18s, border-color .18s, color .18s;
  }
  .pill:hover { background: rgba(91,122,149,0.12); color: var(--glacier); }
  .pill.active { border-color: var(--ice-mist); color: var(--ice-mist); background: rgba(91,122,149,0.16); }

  /* social links grid — 2 columns × 3 rows keeps the panel tall/portrait */
  .links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--hair); border-top: 1px solid var(--hair); }
  .link {
    background: rgba(12,17,24,0.55); padding: 18px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    transition: background .2s; position: relative;
  }
  .link:hover { background: rgba(91,122,149,0.16); }
  .link .l-ico { display: block; height: 20px; }
  .link .l-ico svg { width: 20px; height: 20px; display: block; fill: var(--silver); opacity: 0.85; transition: fill .2s, opacity .2s; }
  .link:hover .l-ico svg { fill: #fff; opacity: 1; }
  .link .l-v { font-family: var(--primary); font-weight: 600; font-size: 12px; color: var(--glacier-dim); transition: color .2s; }
  .link:hover .l-v { color: var(--glacier); }

  /* ── mobile: keep the whole hub inside one screen ── */
  @media (max-width: 520px) {
    .rail, .foot { font-size: 8px; letter-spacing: 0.14em; padding-left: 16px; padding-right: 16px; }
    .hub { padding: 56px 14px; gap: 0; }
    .module { width: 100%; max-width: 300px; }       /* keep the panel narrow/vertical on mobile */
    .mod-header { padding: 24px 16px 15px; gap: 9px; }

    .player { padding: 12px; gap: 10px; }
    .tracks { padding: 0 12px 12px; }
    .links { grid-template-columns: repeat(2, 1fr); }   /* 2×3 keeps it portrait */
    .link { padding: 14px 6px; gap: 7px; }

        scanline.style.opacity = '1';
        const BUILD = 2900;
        skelBuild.style.transition = 'clip-path ' + BUILD + 'ms ease-in-out, -webkit-clip-path ' + BUILD + 'ms ease-in-out';
        scanline.style.transition = 'top ' + BUILD + 'ms ease-in-out';
        skelBuild.style.clipPath = 'inset(0 0 0% 0)'; skelBuild.style.webkitClipPath = 'inset(0 0 0% 0)';
        scanline.style.top = '100%';
      });
      at(3100, () => emit('mount player :: 444-enigma-demo.m4a', 'sys'));
      at(3600, () => emit('queue :: fadeaway-demo · nrg-demo', 'sys'));
      at(4100, () => emit('link nodes :: instagram soundcloud spotify', 'sys'));
      at(4600, () => emit('link nodes :: apple-music patreon mail', 'sys'));
      at(5100, () => emit('draw grid 2×3 ... ok', 'ok'));
      at(5400, () => { scanline.style.transition = 'opacity 0.4s'; scanline.style.opacity = '0'; skelGrid.classList.add('lit'); emit('interface composed', 'ok'); });

      // 6.0 — LAST: the wireframe relic CONSTRUCTS from the centre outward (shader radial build), subtle, behind everything
      at(6000, () => bigText('CONSTRUCTING GEOMETRY', 'clamp(12px,1.9vh,20px)'));
      at(6150, () => { emit('construct geometry :: wispies.glb', 'sys'); boot.style.transition = 'background-color 1.8s ease'; fadeVeil(0.34); relicMode('wire'); });
      at(7300, () => emit('signal integrity ... 100%', 'ok'));

      // 7.7 — clear the installer overlays, final status, then white flash → live UI
      at(7700, () => { fxClearAll(); emit('// RENDER COMPLETE', 'secured'); bigText('444', 'clamp(20px,3vh,40px)'); });
      at(8400, startWhiteFlash);
    }
    setTimeout(runBoot, 250);

    /* ── hub reveal + typewriter ── */
    function startHub() {
      setTimeout(() => document.getElementById('module').classList.add('reveal'), 200);
      setTimeout(typewriter, 760);
    }
    // friendly console voice — brand-kit flavored lines that cycle in the hub
    const HUB_LINES = [
      'welcome to the higher calling',
      'signal locked // you are tuned in',
      'transmission received, traveler',
      'between violence and beauty',
      'through the storm, not beyond it',
      'the relay is warm — stay a while',
      'celestial curiosity engaged',
      'you found the frequency',
      'the choir is listening',
    ];
    function typewriter() {
      const el = document.getElementById('typewriter');
      if (reduce) { el.textContent = HUB_LINES[0]; return; }
      let li = 0;
      function type() {
        const msg = HUB_LINES[li]; let i = 0;
        (function ch() {
          el.textContent = msg.slice(0, i++);
          if (i <= msg.length) setTimeout(ch, 42 + Math.random() * 28);
          else setTimeout(erase, 2300);
        })();
      }
      function erase() {
        const full = el.textContent; let i = full.length;
        (function ch() {
          el.textContent = full.slice(0, i);
          if (i-- > 0) setTimeout(ch, 22);
          else { li = (li + 1) % HUB_LINES.length; setTimeout(type, 380); }
        })();
      }
      type();
    }

    /* ── clock ── */
    const clockEl = document.getElementById('clock');
    (function tickClock(){ const d=new Date(), p=n=>String(n).padStart(2,'0');
      clockEl.textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
      setTimeout(tickClock, 1000); })();

    /* ── live world-population counter (≈8.23B at base epoch, net +2.3/sec) ── */
    const popEl = document.getElementById('popcount');
    const POP_BASE = 8_231_600_000;                 // ~world population, 2026-06-18 00:00 UTC
    const POP_EPOCH = Date.UTC(2026, 5, 18, 0, 0, 0) / 1000;
    const POP_RATE = 2.3;                            // net births-minus-deaths per second
    (function popTick(){
      const now = Date.now() / 1000;
      const pop = Math.floor(POP_BASE + (now - POP_EPOCH) * POP_RATE);
      popEl.textContent = pop.toLocaleString('en-US');
      setTimeout(popTick, 400);
    })();

    /* ════ TRANSMISSIONS (compact) ════ */
    const TX = [
      { title: 'ENIGMA DEMO',   tag: 'ENIGMA',   src: 'audio/444-enigma-demo.m4a' },
      { title: 'FADEAWAY DEMO', tag: 'FADEAWAY', src: 'audio/444-fadeaway-demo.m4a' },
      { title: 'NRG DEMO',      tag: 'NRG',      src: 'audio/444-nrg-demo.m4a' },
    ];
    const audio = new Audio(); audio.preload = 'metadata';
    let idx = 0, ctx, analyser, freq, gain;
    let muted = false;
    let volume = 0.5;                          // gentle default — never start at full blast
    try { const v = parseFloat(localStorage.getItem('444-vol')); if (v >= 0 && v <= 1) volume = v; } catch (e) {}

    const elList = document.getElementById('tx-list');
    const elTitle = document.getElementById('tx-title');
    const elState = document.getElementById('tx-state');
    const elCur = document.getElementById('tx-cur');
    const elDur = document.getElementById('tx-dur');
    const elIcon = document.getElementById('tx-play-icon');
    const player = document.getElementById('tx');
    const viz = document.getElementById('tx-viz');
    const vctx = viz.getContext('2d');

    const fmt = s => { if (!isFinite(s)) return '0:00'; const m=Math.floor(s/60),x=Math.floor(s%60); return `${m}:${String(x).padStart(2,'0')}`; };

    TX.forEach((t, i) => {
      const pill = document.createElement('div');
      pill.className = 'pill' + (i===0 ? ' active' : ''); pill.textContent = t.tag;
      pill.addEventListener('click', () => { load(i); play(); });
      elList.appendChild(pill);
    });
    function setActive(){ [...elList.children].forEach((p,i)=>p.classList.toggle('active', i===idx)); }
    function load(i){ idx=(i+TX.length)%TX.length; audio.src=TX[idx].src; elTitle.textContent=TX[idx].title; setActive(); }
    function ensureGraph(){
      if (ctx) return;
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      const sn = ctx.createMediaElementSource(audio);
      analyser = ctx.createAnalyser(); analyser.fftSize = 128; freq = new Uint8Array(analyser.frequencyBinCount);
      gain = ctx.createGain(); gain.gain.value = effVol();
      // analyser reads the source at full scale (so the viz isn't tied to volume); gain trims the output
      sn.connect(analyser); analyser.connect(gain); gain.connect(ctx.destination);
    }
    function effVol(){ return muted ? 0 : volume; }
    function applyGain(tc){ if (!gain) return; const now=ctx.currentTime; gain.gain.cancelScheduledValues(now); gain.gain.setTargetAtTime(effVol(), now, tc); }
    function play(){
      ensureGraph();
      if (ctx.state==='suspended') ctx.resume();
      const now = ctx.currentTime;             // soft ~0.5s fade-in so playback never starts at full blast
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.setTargetAtTime(effVol(), now, 0.16);
      audio.play();
    }
    function toggle(){ audio.paused ? play() : audio.pause(); }

    audio.addEventListener('play', () => { elIcon.setAttribute('d','M6 5h4v14H6zM14 5h4v14h-4z'); elState.textContent='Broadcasting'; player.classList.add('playing'); });
    audio.addEventListener('pause', () => { elIcon.setAttribute('d','M8 5v14l11-7z'); elState.textContent='Standby'; player.classList.remove('playing'); });
    audio.addEventListener('ended', () => { load(idx+1); play(); });
    audio.addEventListener('loadedmetadata', () => { elDur.textContent = fmt(audio.duration); });
    audio.addEventListener('timeupdate', () => { elCur.textContent = fmt(audio.currentTime); });

    document.getElementById('tx-play').addEventListener('click', toggle);
    document.getElementById('tx-next').addEventListener('click', () => { load(idx+1); play(); });
    load(0);

    /* ── volume control (slider + mute) ── */
    const elVol = document.getElementById('tx-vol');
    const elMute = document.getElementById('tx-mute');
    const elVolIcon = document.getElementById('tx-vol-icon');
    const VOL_ON  = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
    const VOL_OFF = 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z';
    function syncVol(){
      const on = !muted && volume > 0;
      elVol.value = Math.round(volume*100);
      elVol.style.setProperty('--fill', (muted ? 0 : volume*100) + '%');
      elVolIcon.setAttribute('d', on ? VOL_ON : VOL_OFF);
      elMute.classList.toggle('muted', !on);
    }
    elVol.addEventListener('input', () => {
      volume = elVol.value/100; if (volume>0) muted=false;
      try { localStorage.setItem('444-vol', String(volume)); } catch (e) {}
      applyGain(0.02); syncVol();
    });
    elMute.addEventListener('click', () => { muted=!muted; applyGain(0.05); syncVol(); });
    syncVol();

    /* ── waveform viz + drive the 3D relic ── */
    function sizeViz(){ const dpr=Math.min(window.devicePixelRatio,2); vctx.setTransform(1,0,0,1,0,0); viz.width=viz.clientWidth*dpr; viz.height=viz.clientHeight*dpr; vctx.scale(dpr,dpr); }
    window.addEventListener('resize', sizeViz); setTimeout(sizeViz, 50);
    const BARS = 42;
    const levels = new Float32Array(BARS);   // persisted across frames so we can lerp
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    (function draw(){
      requestAnimationFrame(draw);
      const w=viz.clientWidth, h=viz.clientHeight; if (!w) return;
      vctx.clearRect(0,0,w,h);
      const gap=2, bw=(w-(BARS-1)*gap)/BARS;
      const live = analyser && !audio.paused;
      if (live) analyser.getByteFrequencyData(freq);
      const t = Date.now()/1000;
      let sum=0;
      for (let i=0;i<BARS;i++){
        let target, k;
        if (live) {
          target = freq[Math.floor(i/BARS*freq.length)]/255;
          // asymmetric lerp — quick attack, gentle release so bars move musically, not jittery
          k = target > levels[i] ? 0.5 : 0.12;
        } else {
          // idle standby wave: two slow sines travelling opposite ways + a gentle breathing envelope
          const u = i/(BARS-1);
          const wv = Math.sin(u*6.2 - t*1.4)*0.5 + Math.sin(u*2.7 + t*0.9)*0.5;   // -1..1
          target = reduceMotion ? 0.12 : (0.14 + 0.42*(wv*0.5+0.5)) * (0.80 + 0.20*Math.sin(t*0.7));
          k = 0.18;   // symmetric smoothing keeps the travelling wave shape clean
        }
        levels[i] += (target - levels[i]) * k;
        sum += levels[i];
        const bh=Math.max(1.5, levels[i]*h);
        const grd=vctx.createLinearGradient(0,h,0,h-bh); grd.addColorStop(0,'#5B7A95'); grd.addColorStop(1,'#EEF2F5');
        vctx.fillStyle=grd; vctx.fillRect(i*(bw+gap), h-bh, bw, bh);
      }
      window.__txLevel = audio.paused ? (window.__txLevel||0)*0.9 : (sum/BARS);
    })();
  })();
  </script>
</body>
